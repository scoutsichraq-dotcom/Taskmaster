name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows installer and publish
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:vite

      - name: Build and publish with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }} # optional: code signing .p12 url or base64
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }} # optional
        run: npx electron-builder --win --x64 --publish=always

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: out/
